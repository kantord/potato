<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Book Search</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Georgia, serif;
            background: #1a1a2e;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .subtitle { color: #94a3b8; margin-bottom: 2rem; font-style: italic; }
        form {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        input {
            flex: 1;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 1rem;
            font-family: Georgia, serif;
        }
        button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            background: #6366f1;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            font-family: Georgia, serif;
        }
        button:hover { background: #4f46e5; }
        #results {
            line-height: 1.6;
        }
        .result {
            background: #1e293b;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            font-family: monospace;
            font-size: 0.9rem;
        }
        .no-results {
            color: #94a3b8;
            font-style: italic;
        }
        .htmx-indicator {
            color: #94a3b8;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>Book Search</h1>
    <p class="subtitle">Search through Alice's Adventures in Wonderland by Lewis Carroll</p>

    <form hx-post="/render"
          hx-target="#results"
          hx-indicator="#loading"
          hx-ext="json-enc"
          hx-vals='js:{"cmd": ["/search.sh"], "data": {"query": document.getElementById("query").value}}'
          hx-headers='{"Accept": "text/html"}'>
        <input type="text" id="query" name="query" placeholder="Search for a word or phrase..." autofocus />
        <button type="submit">Search</button>
    </form>

    <div id="loading" class="htmx-indicator">Searching...</div>
    <div id="results">Type a search term and press Search.</div>
</body>
</html>
