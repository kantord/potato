<!DOCTYPE html>
<html data-theme="dark">
<head>
    <meta charset="utf-8">
    <title>Book Search</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js"></script>
</head>
<body>
    <main class="container">
        <h1>Book Search</h1>
        <p><em>Search through Alice's Adventures in Wonderland by Lewis Carroll</em></p>

        <form hx-post="/render"
              hx-target="#results"
              hx-indicator="#loading"
              hx-ext="json-enc"
              hx-vals='js:{"cmd": ["search.sh"], "data": {"query": document.getElementById("query").value}}'
              hx-headers='{"Accept": "text/html"}'>
            <fieldset role="group">
                <input type="text" id="query" name="query" placeholder="Search for a word or phrase..." autofocus />
                <button type="submit">Search</button>
            </fieldset>
        </form>

        <p id="loading" aria-busy="true" class="htmx-indicator">Searching...</p>
        <section id="results">Type a search term and press Search.</section>
    </main>
</body>
</html>
